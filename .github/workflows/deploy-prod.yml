name: Deploy Professor (Prod)

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-professor-prod
  cancel-in-progress: true

env:
  DEPLOY_PATH: /workspace/xipilabs/professor

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (build on server)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -eu
            mkdir -p "${{ env.DEPLOY_PATH }}"
            cd "${{ env.DEPLOY_PATH }}"

            if [ ! -f .env ]; then
              echo "Missing ${{ env.DEPLOY_PATH }}/.env. Create it first." >&2
              exit 1
            fi

            if [ ! -d .git ]; then
              git clone --depth 1 https://github.com/${{ github.repository }} .
            else
              git fetch origin main
              git checkout main
              git pull --ff-only origin main
            fi

            docker compose -f docker-compose.prod.yml build professor
            docker compose -f docker-compose.prod.yml up -d professor
            docker image prune -f --filter "until=168h"
