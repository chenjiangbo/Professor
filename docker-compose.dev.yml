services:
  # Dev overrides: expose ports for local debugging (do NOT use in production)
  bibigpt-dev:
    ports:
      - 3302:3000
    environment:
      POSTGRES_HOST: taleweave-postgres
      POSTGRES_PORT: 5432
    networks:
      - xipi-network

  litellm-proxy:
    platform: linux/amd64
    ports:
      - 4180:4000
    networks:
      - xipi-network

networks:
  xipi-network:
    external: true
