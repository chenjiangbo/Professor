services:
  # Dev overrides: expose ports for local debugging (do NOT use in production)
  bibigpt-dev:
    ports:
      - 3302:3000
    environment:
      POSTGRES_HOST: taleweave-postgres
      POSTGRES_PORT: 5432
      DEV_AUTH_MODE: mock
      DEV_AUTH_MOCK_USER_ID: 00000000-0000-0000-0000-000000000001
    networks:
      - xipi-network

networks:
  xipi-network:
    external: true
