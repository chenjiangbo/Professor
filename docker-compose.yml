# Hi, this is a Docker service startup configuration.
# Please make sure to configure the .env file in this project's root directory before proceeding.
# you can directly execute the following command to start the service.
# $ docker compose up -d

# Choose one of the following two services below.
# If you do not need a particular service, please try to comment it out.

services:
  # Service 1> Production environment image
  bibigpt:
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        # If you want to use sentry, please set IS_USED_SENTRY=1
        IS_USED_SENTRY: 0
    container_name: bibigpt
    env_file: .env
    ports:
      - 8300:3000
    networks:
      - xipi-network

  #  Service 2> Development environment image
  bibigpt-dev:
    build:
      context: ./
      dockerfile: dev.Dockerfile
    container_name: bibigpt-dev
    ports:
      - 3302:3000
    env_file: .env
    networks:
      - xipi-network

  # Service 3> LiteLLM Proxy (统一 LLM 网关)
  litellm-proxy:
    image: ghcr.io/berriai/litellm:main
    container_name: litellm-proxy
    env_file: .env
    platform: linux/amd64
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/vertex-sa.json
    volumes:
      - ./litellm.config.template.yaml:/app/litellm.config.template.yaml:ro
      - ./crafty-willow-469010-d3-a16f33a47583.json:/app/vertex-sa.json:ro
    entrypoint: ['/bin/sh', '-c']
    command: >
      "pip install --no-cache-dir --upgrade 'litellm[proxy]==1.81.12' python-multipart && python -c \"import os, pathlib; src=pathlib.Path('/app/litellm.config.template.yaml'); dst=pathlib.Path('/tmp/litellm.config.yaml'); dst.write_text(os.path.expandvars(src.read_text())); print('Rendered config to', dst); print(dst.read_text())\" && export LITELLM_CONFIG_PATH=/tmp/litellm.config.yaml && litellm --config /tmp/litellm.config.yaml --port 4000"
    networks:
      - xipi-network

networks:
  xipi-network:
    external: true
