# Hi, this is a Docker service startup configuration.
# Please make sure to configure the .env file in this project's root directory before proceeding.
# you can directly execute the following command to start the service.
# $ docker compose up -d

# Choose one of the following two services below.
# If you do not need a particular service, please try to comment it out.

services:
  # Service 1> Production environment image
  bibigpt:
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        # If you want to use sentry, please set IS_USED_SENTRY=1
        IS_USED_SENTRY: 0
    container_name: bibigpt
    env_file: .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/vertex-sa.json
      NOTEBOOK_COVER_STORAGE_DIR: /app/storage/notebook-covers
      VERTEX_NOTEBOOK_COVER_MODEL: imagen-4.0-fast-generate-001
    volumes:
      - ./crafty-willow-469010-d3-a16f33a47583.json:/app/vertex-sa.json:ro
      - ./storage:/app/storage
    ports:
      - 8300:3000
    networks:
      - xipi-network

  #  Service 2> Development environment image
  bibigpt-dev:
    build:
      context: ./
      dockerfile: dev.Dockerfile
    container_name: bibigpt-dev
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/vertex-sa.json
      NOTEBOOK_COVER_STORAGE_DIR: /app/storage/notebook-covers
      VERTEX_NOTEBOOK_COVER_MODEL: imagen-4.0-fast-generate-001
    volumes:
      - ./crafty-willow-469010-d3-a16f33a47583.json:/app/vertex-sa.json:ro
      - ./storage:/app/storage
    ports:
      - 3302:3000
    env_file: .env.local
    networks:
      - xipi-network

  billing-worker:
    build:
      context: ./
      dockerfile: dev.Dockerfile
    container_name: billing-worker
    command: npm run worker:billing
    env_file: .env.local
    environment:
      INTERNAL_JOB_BASE_URL: http://bibigpt-dev:3000
      GOOGLE_APPLICATION_CREDENTIALS: /app/vertex-sa.json
      NOTEBOOK_COVER_STORAGE_DIR: /app/storage/notebook-covers
      VERTEX_NOTEBOOK_COVER_MODEL: imagen-4.0-fast-generate-001
    volumes:
      - ./crafty-willow-469010-d3-a16f33a47583.json:/app/vertex-sa.json:ro
      - ./storage:/app/storage
    depends_on:
      - bibigpt-dev
    networks:
      - xipi-network

networks:
  xipi-network:
    external: true
